<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 430" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="r-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a1a1a"/>
    </marker>
    <marker id="r-arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8a8a8a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1000" height="430" fill="#ffffff"/>
  <text x="500" y="26" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a1a">soarm_mjlab: RL training loop (RSL-RL PPO, manager-based MDP)</text>

  <!-- Box 1: task/env setup -->
  <g>
    <rect x="20" y="90" width="205" height="100" rx="6" fill="#ffffff" stroke="#1a1a1a" stroke-width="2"/>
    <text x="122" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">1. Task setup</text>
    <text x="122" y="133" text-anchor="middle" font-size="10.5" fill="#444">reach_env_cfg.py</text>
    <text x="122" y="148" text-anchor="middle" font-size="10.5" fill="#444">reachable-workspace box</text>
    <text x="122" y="163" text-anchor="middle" font-size="10.5" fill="#444">from FK-sampled joint limits</text>
    <text x="122" y="180" text-anchor="middle" font-size="10" fill="#777">num_envs parallel copies</text>
  </g>

  <!-- Box 2: rollout -->
  <g>
    <rect x="265" y="90" width="205" height="100" rx="6" fill="#f5f5f5" stroke="#1a1a1a" stroke-width="2.5"/>
    <text x="367" y="112" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">2. Rollout</text>
    <text x="367" y="130" text-anchor="middle" font-size="10.5" fill="#444">N parallel MuJoCo envs</text>
    <text x="367" y="145" text-anchor="middle" font-size="10.5" fill="#444">obs → π_θ(obs) → step()</text>
    <text x="367" y="160" text-anchor="middle" font-size="10.5" fill="#444">reward + termination check</text>
    <text x="367" y="178" text-anchor="middle" font-size="10" fill="#777">24 steps / env / update</text>
  </g>

  <!-- Box 3: PPO update -->
  <g>
    <rect x="510" y="90" width="205" height="100" rx="6" fill="#f5f5f5" stroke="#1a1a1a" stroke-width="2.5"/>
    <text x="612" y="112" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">3. PPO update</text>
    <text x="612" y="130" text-anchor="middle" font-size="10.5" fill="#444">RSL-RL actor-critic</text>
    <text x="612" y="145" text-anchor="middle" font-size="10.5" fill="#444">GAE advantage, clipped surrogate</text>
    <text x="612" y="160" text-anchor="middle" font-size="10.5" fill="#444">5 epochs × 4 minibatches</text>
    <text x="612" y="178" text-anchor="middle" font-size="10" fill="#777">adaptive LR → desired_kl</text>
  </g>

  <!-- Box 4: checkpoint -->
  <g>
    <rect x="755" y="90" width="215" height="100" rx="6" fill="#ffffff" stroke="#1a1a1a" stroke-width="2"/>
    <text x="862" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a">4. Checkpoint</text>
    <text x="862" y="133" text-anchor="middle" font-size="10.5" fill="#444">updated policy weights θ</text>
    <text x="862" y="148" text-anchor="middle" font-size="10.5" fill="#444">saved every 100 iterations</text>
    <text x="862" y="163" text-anchor="middle" font-size="10.5" fill="#444">up to 1500 iterations</text>
    <text x="862" y="180" text-anchor="middle" font-size="10" fill="#777">tensorboard reward curve</text>
  </g>

  <!-- forward arrows -->
  <path d="M 225 140 L 261 140" fill="none" stroke="#1a1a1a" stroke-width="1.8" marker-end="url(#r-arrow)"/>
  <path d="M 470 140 L 506 140" fill="none" stroke="#1a1a1a" stroke-width="1.8" marker-end="url(#r-arrow)"/>
  <path d="M 715 140 L 751 140" fill="none" stroke="#1a1a1a" stroke-width="1.8" marker-end="url(#r-arrow)"/>

  <!-- loop-back arrow: updated policy drives next rollout -->
  <path d="M 862 90 C 862 55, 367 55, 367 86" fill="none" stroke="#1a1a1a" stroke-width="1.6" stroke-dasharray="1,0" marker-end="url(#r-arrow)"/>
  <text x="612" y="52" text-anchor="middle" font-size="10.5" fill="#555">next rollout uses updated π_θ — repeats for max_iterations</text>

  <!-- downstream: sim-replay + real-hardware deploy (planned) -->
  <path d="M 862 190 L 862 226" fill="none" stroke="#8a8a8a" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#r-arrow-gray)"/>

  <g>
    <rect x="690" y="234" width="180" height="60" rx="6" fill="#ffffff" stroke="#8a8a8a" stroke-width="1.8" stroke-dasharray="5,3"/>
    <text x="780" y="256" text-anchor="middle" font-size="12.5" font-weight="700" fill="#555">Sim-replay validation</text>
    <text x="780" y="272" text-anchor="middle" font-size="10" fill="#777">through the deploy code path</text>
    <text x="780" y="286" text-anchor="middle" font-size="9.5" fill="#999">planned — Phase 5</text>
  </g>

  <path d="M 780 294 L 780 320" fill="none" stroke="#8a8a8a" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#r-arrow-gray)"/>

  <g>
    <rect x="660" y="328" width="240" height="60" rx="6" fill="#ffffff" stroke="#8a8a8a" stroke-width="1.8" stroke-dasharray="5,3"/>
    <text x="780" y="350" text-anchor="middle" font-size="12.5" font-weight="700" fill="#555">Real SO-ARM100</text>
    <text x="780" y="366" text-anchor="middle" font-size="10" fill="#777">via soarm_sdk.RobotInterface</text>
    <text x="780" y="380" text-anchor="middle" font-size="9.5" fill="#999">planned — Phase 5, staged rollout</text>
  </g>

  <text x="500" y="415" text-anchor="middle" font-size="11" fill="#888">Same RobotInterface Protocol as sim — the deploy script doesn't know whether it's driving MuJoCo or the physical arm.</text>
</svg>

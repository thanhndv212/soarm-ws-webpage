<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="pl-arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#8a8a8a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1000" height="300" fill="#ffffff"/>
  <text x="500" y="26" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a1a">Classical joint-space planning &amp; control — planned, not yet implemented</text>

  <!-- Box 1: goal -->
  <g>
    <rect x="15" y="70" width="175" height="100" rx="6" fill="#ffffff" stroke="#8a8a8a" stroke-width="1.8" stroke-dasharray="5,3"/>
    <text x="102" y="94" text-anchor="middle" font-size="13.5" font-weight="700" fill="#555">1. Goal spec</text>
    <text x="102" y="112" text-anchor="middle" font-size="10.5" fill="#666">Cartesian pose or</text>
    <text x="102" y="126" text-anchor="middle" font-size="10.5" fill="#666">joint configuration</text>
    <text x="102" y="145" text-anchor="middle" font-size="10" fill="#888">IK via roboplan / pinocchio</text>
    <text x="102" y="159" text-anchor="middle" font-size="10" fill="#888">if Cartesian</text>
  </g>

  <!-- Box 2: RRT planning -->
  <g>
    <rect x="220" y="70" width="175" height="100" rx="6" fill="#f7f7f7" stroke="#8a8a8a" stroke-width="1.8" stroke-dasharray="5,3"/>
    <text x="307" y="94" text-anchor="middle" font-size="13.5" font-weight="700" fill="#555">2. Path search</text>
    <text x="307" y="112" text-anchor="middle" font-size="10.5" fill="#666">roboplan RRT, joint space</text>
    <text x="307" y="126" text-anchor="middle" font-size="10.5" fill="#666">collision check via</text>
    <text x="307" y="140" text-anchor="middle" font-size="10.5" fill="#666">pinocchio geometry model</text>
    <text x="307" y="159" text-anchor="middle" font-size="10" fill="#888">→ coarse, jagged waypoints</text>
  </g>

  <!-- Box 3: TOPP-RA timing -->
  <g>
    <rect x="425" y="70" width="175" height="100" rx="6" fill="#f7f7f7" stroke="#8a8a8a" stroke-width="1.8" stroke-dasharray="5,3"/>
    <text x="512" y="94" text-anchor="middle" font-size="13.5" font-weight="700" fill="#555">3. Trajectory timing</text>
    <text x="512" y="112" text-anchor="middle" font-size="10.5" fill="#666">roboplan → TOPP-RA</text>
    <text x="512" y="126" text-anchor="middle" font-size="10.5" fill="#666">min-time scaling under</text>
    <text x="512" y="140" text-anchor="middle" font-size="10.5" fill="#666">velocity / accel limits</text>
    <text x="512" y="159" text-anchor="middle" font-size="10" fill="#888">→ q_des(t), q̇_des(t)</text>
  </g>

  <!-- Box 4: tracking -->
  <g>
    <rect x="630" y="70" width="175" height="100" rx="6" fill="#f7f7f7" stroke="#8a8a8a" stroke-width="1.8" stroke-dasharray="5,3"/>
    <text x="717" y="94" text-anchor="middle" font-size="13.5" font-weight="700" fill="#555">4. Joint tracking</text>
    <text x="717" y="112" text-anchor="middle" font-size="10.5" fill="#666">simple position/velocity PD</text>
    <text x="717" y="126" text-anchor="middle" font-size="10.5" fill="#666">no Jacobian, no learned</text>
    <text x="717" y="140" text-anchor="middle" font-size="10.5" fill="#666">dynamics model</text>
    <text x="717" y="159" text-anchor="middle" font-size="10" fill="#888">→ per-joint command</text>
  </g>

  <!-- Box 5: servo bus -->
  <g>
    <rect x="835" y="70" width="150" height="100" rx="6" fill="#ffffff" stroke="#8a8a8a" stroke-width="1.8" stroke-dasharray="5,3"/>
    <text x="910" y="100" text-anchor="middle" font-size="13.5" font-weight="700" fill="#555">5. Servo bus</text>
    <text x="910" y="120" text-anchor="middle" font-size="10.5" fill="#666">STS3215 onboard</text>
    <text x="910" y="134" text-anchor="middle" font-size="10.5" fill="#666">position PID</text>
    <text x="910" y="153" text-anchor="middle" font-size="10" fill="#888">(soarm_sdk)</text>
  </g>

  <!-- arrows -->
  <path d="M 190 120 L 216 120" fill="none" stroke="#8a8a8a" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#pl-arrow-gray)"/>
  <path d="M 395 120 L 421 120" fill="none" stroke="#8a8a8a" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#pl-arrow-gray)"/>
  <path d="M 600 120 L 626 120" fill="none" stroke="#8a8a8a" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#pl-arrow-gray)"/>
  <path d="M 805 120 L 831 120" fill="none" stroke="#8a8a8a" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#pl-arrow-gray)"/>

  <text x="500" y="210" text-anchor="middle" font-size="11" fill="#888">One-shot, deliberative: plan once, then execute open-loop — no human in the loop, no learned policy, no MuJoCo/GPU training.</text>
  <text x="500" y="228" text-anchor="middle" font-size="11" fill="#888">Reuses the same URDF/pinocchio model as m5teleop's IK solver; roboplan replaces pink's differential QP with an offline RRT + TOPP-RA solve.</text>
</svg>
